<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Game Cho Bé</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Nunito','Segoe UI',Arial,sans-serif;background:linear-gradient(180deg,#0f3460,#1a1a2e,#16213e);min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px;flex-direction:column}
.game-grid{display:flex;gap:24px;flex-wrap:wrap;justify-content:center;max-width:800px;width:100%}
.game-card{background:linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,255,255,.02));border:2px solid rgba(255,255,255,.08);border-radius:28px;padding:40px 32px;text-align:center;flex:1;min-width:240px;max-width:360px;cursor:pointer;transition:all .3s;text-decoration:none;backdrop-filter:blur(8px);position:relative;overflow:hidden}
.game-card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 50% 40%,rgba(255,255,255,.04),transparent 50%);pointer-events:none}
.game-card:hover{transform:translateY(-4px);border-color:rgba(255,255,255,.2);box-shadow:0 12px 40px rgba(0,0,0,.3)}
.game-card:active{transform:translateY(-2px) scale(.98)}
.game-card-emoji{font-size:4rem;margin-bottom:8px}
.game-card-title{color:#fff;font-size:1.6rem;font-weight:900;margin-bottom:4px}
.game-card-desc{color:rgba(255,255,255,.5);font-size:.95rem;font-weight:600}
.game-card.c1{border-color:rgba(255,215,0,.2)}
.game-card.c1:hover{border-color:rgba(255,215,0,.4);box-shadow:0 12px 40px rgba(255,215,0,.1)}
.game-card.c2{border-color:rgba(233,69,96,.2)}
.game-card.c2:hover{border-color:rgba(233,69,96,.4);box-shadow:0 12px 40px rgba(233,69,96,.1)}
.title{color:#fff;font-size:2.2rem;font-weight:900;margin-bottom:6px;text-align:center;text-shadow:0 4px 20px rgba(0,0,0,.3)}
.title span{background:linear-gradient(90deg,#ffd700,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{color:rgba(255,255,255,.4);font-size:1rem;margin-bottom:28px;text-align:center;font-weight:600}
.v{position:fixed;bottom:4px;left:0;right:0;text-align:center;color:rgba(255,255,255,.12);font-size:.6rem;pointer-events:none}

@media(max-width:600px){
  .title{font-size:1.5rem}
  .sub{font-size:.85rem;margin-bottom:20px}
  .game-card{padding:28px 20px;min-width:160px;border-radius:20px}
  .game-card-emoji{font-size:3rem}
  .game-card-title{font-size:1.2rem}
  .game-card-desc{font-size:.82rem}
}
@media(max-width:400px){
  .game-grid{gap:14px}
  .game-card{padding:20px 14px}
  .game-card-emoji{font-size:2.4rem}
  .game-card-title{font-size:1rem}
  .v{font-size:.5rem}
}
</style>
</head>
<body>
<div class="title">🎮 GAME <span>CHO BÉ</span></div>
<div class="sub">Chọn game để chơi nhé! ✨</div>
<div class="game-grid">
  <a class="game-card c1" href="typhu/">
    <div class="game-card-emoji">💰</div>
    <div class="game-card-title">Ai Là Triệu Phú</div>
    <div class="game-card-desc">Trả lời 15 câu hỏi • Nhiều chủ đề</div>
  </a>
  <a class="game-card c2" href="pop/">
    <div class="game-card-emoji">🫧</div>
    <div class="game-card-title">Bong Bóng Toán</div>
    <div class="game-card-desc">Bấm bong bóng đúng • Cộng &amp; Trừ</div>
  </a>
</div>
<div class="v">v1.0.0 — Game Cho Bé © 2026</div>
</body>
</html>
