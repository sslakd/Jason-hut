<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ai Là Triệu Phú — Học Toán & Tiếng Anh</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#0a1628,#1a237e,#0d47a1);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;flex-direction:column}
#app{width:100%;max-width:820px}
.container{width:100%;background:linear-gradient(180deg,#1a237e,#283593);border-radius:28px;padding:24px;box-shadow:0 8px 40px rgba(0,0,0,.5);position:relative;overflow:hidden}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:42px;height:42px;background:linear-gradient(135deg,#ffd700,#ff8f00);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#1a237e;box-shadow:0 2px 8px rgba(255,215,0,.4)}
.logo-text{color:#ffd700;font-size:1.1rem;font-weight:700;line-height:1.2}
.logo-text span{color:#82b1ff;font-size:.75rem;font-weight:400;display:block}
.money-display{background:linear-gradient(135deg,#2e7d32,#1b5e20);border-radius:12px;padding:8px 16px;display:flex;align-items:center;gap:8px;box-shadow:0 2px 12px rgba(46,125,50,.3)}
.money-icon{font-size:1.3rem}
.money-amount{color:#fff;font-size:1.2rem;font-weight:800;font-family:'Courier New',monospace}
.money-amount span{color:#81c784;font-size:.8rem;font-weight:400}
.opt-btn{padding:10px 24px;border-radius:12px;border:2px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:#bbb;font-size:1rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.opt-btn:hover{background:rgba(255,255,255,.1);color:#fff}
.opt-btn.selected{background:linear-gradient(135deg,#ffd700,#ff8f00);color:#1a237e;border-color:#ffd700;box-shadow:0 4px 16px rgba(255,215,0,.3)}
.start-btn{background:linear-gradient(135deg,#ffd700,#ff8f00);color:#1a237e;border:none;border-radius:14px;padding:14px 48px;font-size:1.15rem;font-weight:800;cursor:pointer;font-family:inherit;transition:all .2s;box-shadow:0 4px 20px rgba(255,215,0,.3)}
.start-btn:hover{transform:scale(1.03)}
.start-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.qnum{color:rgba(255,255,255,.5);font-size:.85rem;text-align:center;margin-bottom:4px}
.ladder{display:flex;justify-content:center;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.step{padding:4px 10px;border-radius:8px;font-size:.72rem;font-weight:700;background:rgba(255,255,255,.06);color:rgba(255,255,255,.4);transition:all .3s;font-family:'Courier New',monospace}
.step.active{background:linear-gradient(135deg,#ffd700,#ff8f00);color:#1a237e;box-shadow:0 2px 10px rgba(255,215,0,.3)}
.step.passed{background:rgba(46,125,50,.3);color:#81c784}
.step.safe{border:1px solid rgba(255,215,0,.2)}
.qbox{background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:20px 24px;margin-bottom:16px;display:flex;align-items:center;justify-content:center}
.qtext{color:#fff;font-size:1.15rem;font-weight:600;text-align:center;line-height:1.5}
.ansgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ansbtn{padding:14px 16px;border:2px solid rgba(255,255,255,.12);border-radius:14px;background:rgba(255,255,255,.05);color:#fff;font-size:1rem;font-weight:600;cursor:pointer;transition:all .2s;text-align:left;display:flex;align-items:center;gap:10px;font-family:inherit}
.ansbtn .lbl{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;flex-shrink:0}
.ansbtn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2)}
.ansbtn.correct{background:rgba(46,125,50,.3);border-color:#4caf50;color:#a5d6a7}
.ansbtn.wrong{background:rgba(198,40,40,.3);border-color:#e53935;color:#ef9a9a}
.ansbtn.disabled{pointer-events:none;opacity:.6}
.btn-group{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
.btn-group button{padding:12px 28px;border-radius:14px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;border:none}
.btn-play{background:linear-gradient(135deg,#ffd700,#ff8f00);color:#1a237e;box-shadow:0 4px 16px rgba(255,215,0,.3)}
.btn-play:hover{transform:scale(1.02)}
.btn-ss{background:rgba(255,255,255,.1);color:#90caf9;border:1px solid rgba(255,255,255,.12)!important}
.btn-ss:hover{background:rgba(255,255,255,.15)}
.btn-home{background:rgba(255,255,255,.08);color:#90caf9;border:1px solid rgba(255,255,255,.12)!important}
.btn-home:hover{background:rgba(255,255,255,.12)}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#2e7d32,#1b5e20);color:#fff;padding:12px 24px;border-radius:12px;font-size:.9rem;font-weight:600;display:none;z-index:1000;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,.1);border-top-color:#ffd700;border-radius:50%;animation:spin .8s linear infinite;margin:20px auto}
.v{text-align:center;color:rgba(255,255,255,0.15);font-size:0.7rem;padding:10px 0 2px;font-family:'Segoe UI',Arial,sans-serif}
@media(max-width:600px){.container{padding:16px;border-radius:20px}.ansgrid{grid-template-columns:1fr}.logo-text{font-size:.95rem}.step{font-size:.65rem;padding:3px 7px}}
</style>
</head>
<body>
<div id="app"><div class="spinner"></div><p style="text-align:center;color:#90caf9;font-size:1rem">Đang tải ngân hàng câu hỏi...</p></div>
<div class="v">v1.4.0 — Ai Là Triệu Phú Game © 2026</div>
<div class="toast" id="toast"></div>
<script>
const PRIZES=[0,200,400,600,1000,2000,3000,4000,6000,8000,12000,16000,20000,30000,40000,50000];
const SAFE=new Set([5,10]);
const LABELS=['A','B','C','D'];

let BANK=null, state={grade:1,subject:'toan',questions:[],cur:-1,money:0,correct:0,answered:false,loading:true};

function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function pickUnique(pool,n){
  let s=shuffle([...pool]),seen=new Set(),r=[];
  for(let q of s){
    let key=q.q.replace(/\d+/g,'#');
    if(!seen.has(key)){seen.add(key);r.push(q)}
    if(r.length>=n)break;
  }
  return r.length>=n?r:shuffle([...pool]).slice(0,n);
}

function showToast(m){
  let t=document.getElementById('toast');
  t.textContent=m;t.style.display='block';
  setTimeout(()=>t.style.display='none',2500);
}

function startGame(){
  if(!BANK)return;
  let pool=BANK[state.subject][String(state.grade)];
  if(!pool||pool.length<15){showToast('Chưa đủ câu hỏi!');return}
  state.questions=pickUnique(pool,15);
  state.cur=0;state.money=0;state.correct=0;state.answered=false;
  render();
}

function goHome(){state.cur=-1;render()}

function answer(idx){
  if(state.answered)return;
  state.answered=true;
  let q=state.questions[state.cur];
  render(); // Show correct/wrong colors immediately
  if(idx===q.c){
    state.correct++;
    setTimeout(()=>{
      state.cur++;
      state.money=PRIZES[state.cur];
      state.answered=false;
      if(state.cur>=15){state.cur=15;render();return}
      render();
    },1000);
  } else {
    let g=0;
    SAFE.forEach(l=>{if(state.cur>=l)g=PRIZES[l]});
    setTimeout(()=>{
      state.money=g;
      state.answered=false;
      state.cur=15; // Force to result screen
      render();
    },1500);
  }
}

function takeSS(){
  let c=document.querySelector('.container');
  if(!c)return;
  if(window.html2canvas){
    window.html2canvas(c).then(can=>{
      can.toBlob(b=>{
        let a=document.createElement('a');
        a.href=URL.createObjectURL(b);
        a.download='ai-la-trieu-phu-'+new Date().toISOString().slice(0,10)+'.png';
        a.click();
        showToast('✅ Đã tải ảnh xuống!');
      });
    });
  } else {
    let s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    s.onload=takeSS;
    document.head.appendChild(s);
  }
}

function render(){
  let app=document.getElementById('app');
  let g=state.grade,s=state.subject,cur=state.cur;
  let label=s==='toan'?'Toán':'Tiếng Anh';

  if(state.loading||!BANK){
    let total=BANK? (BANK.toan[1].length+BANK.toan[2].length+BANK.tienganh[1].length+BANK.tienganh[2].length).toLocaleString() : '...';
    app.innerHTML=`<div class="container"><div class="header"><div class="logo"><div class="logo-icon">💰</div><div class="logo-text">AI LÀ TRIỆU PHÚ<br><span>Đang tải...</span></div></div></div><div class="spinner"></div><p style="text-align:center;color:#90caf9">Đang tải ngân hàng ${total} câu hỏi...</p></div>`;
    return;
  }

  if(cur<0){
    let tq=(BANK.toan[1].length+BANK.toan[2].length+BANK.tienganh[1].length+BANK.tienganh[2].length).toLocaleString();
    let gcls1=g===1?' opt-btn selected':' opt-btn';
    let gcls2=g===2?' opt-btn selected':' opt-btn';
    let scls1=s==='toan'?' opt-btn selected':' opt-btn';
    let scls2=s==='tienganh'?' opt-btn selected':' opt-btn';
    app.innerHTML=`<div class="container">
      <div class="header"><div class="logo"><div class="logo-icon">💰</div><div class="logo-text">AI LÀ TRIỆU PHÚ<br><span>Học Toán & Tiếng Anh</span></div></div></div>
      <div style="text-align:center;padding:20px 16px">
        <div style="font-size:4rem;margin-bottom:8px;animation:bounce 2s infinite">🏆</div>
        <h1 style="color:#ffd700;font-size:1.8rem;font-weight:800;margin-bottom:4px">Ai Là Triệu Phú?</h1>
        <p style="color:#90caf9;margin-bottom:8px">Trả lời đúng 15 câu, rinh tiền thật 🤑</p>
        <p style="color:rgba(255,255,255,0.3);font-size:0.8rem;margin-bottom:16px">📚 ${tq} câu hỏi trong ngân hàng</p>
        <p style="color:#90caf9;font-size:0.85rem;margin-bottom:8px">📚 Chọn lớp</p>
        <div style="display:flex;gap:12px;justify-content:center;margin-bottom:20px">
          <button class="${gcls1}" onclick="state.grade=1;render()">Lớp 1</button>
          <button class="${gcls2}" onclick="state.grade=2;render()">Lớp 2</button>
        </div>
        <p style="color:#90caf9;font-size:0.85rem;margin-bottom:8px">🧮 Chọn môn</p>
        <div style="display:flex;gap:12px;justify-content:center;margin-bottom:24px">
          <button class="${scls1}" onclick="state.subject='toan';render()">➕ Toán</button>
          <button class="${scls2}" onclick="state.subject='tienganh';render()">🔤 Tiếng Anh</button>
        </div>
        <button class="start-btn" onclick="startGame()">▶ BẮT ĐẦU</button>
      </div>
    </div>`;
  } else if(cur<15){
    let q=state.questions[cur];
    let ldr='';
    for(let i=1;i<=15;i++){
      let c='step'+(i===cur+1?' active':(i<=cur?' passed':''))+(SAFE.has(i)?' safe':'');
      ldr+='<span class="'+c+'">₫'+PRIZES[i].toLocaleString()+'</span>';
    }
    let ans='';
    for(let i=0;i<4;i++){
      let c='ansbtn'+(state.answered?(i===q.c?' correct':' wrong'):'')+(state.answered?' disabled':'');
      let oc=state.answered?'':'onclick="answer('+i+')"';
      ans+='<button class="'+c+'" '+oc+'><span class="lbl">'+LABELS[i]+'</span> '+q.a[i]+'</button>';
    }
    app.innerHTML=`<div class="container">
      <div class="header">
        <div class="logo"><div class="logo-icon">💰</div><div class="logo-text">AI LÀ TRIỆU PHÚ<br><span>${label} Lớp ${g}</span></div></div>
        <div class="money-display"><span class="money-icon">🪙</span><span class="money-amount">${state.money.toLocaleString()} <span>đ</span></span></div>
      </div>
      <div class="qnum">Câu ${cur+1} / 15</div>
      <div class="ladder">${ldr}</div>
      <div class="qbox"><div class="qtext">${q.q}</div></div>
      <div class="ansgrid">${ans}</div>
    </div>`;
  } else {
    let win=state.correct>=15;
    let icon=win?'🏆':(state.correct>=5?'😊':'😅');
    let title=win?'🎉 BẠN LÀ TRIỆU PHÚ!':(state.correct>=5?'Khá tốt!':'Cố gắng hơn nhé!');
    let sub=win?'Trả lời đúng cả 15 câu!':'Trả lời đúng '+state.correct+'/15 câu.';
    app.innerHTML=`<div class="container">
      <div class="header"><div class="logo"><div class="logo-icon">💰</div><div class="logo-text">AI LÀ TRIỆU PHÚ<br><span>Kết quả</span></div></div></div>
      <div style="text-align:center;padding:20px 16px">
        <div style="font-size:4rem;margin-bottom:8px">${icon}</div>
        <h2 style="color:#ffd700;font-size:1.6rem;font-weight:800;margin-bottom:4px">${title}</h2>
        <p style="color:#90caf9;margin-bottom:6px">${sub}</p>
        <div style="font-size:2.2rem;font-weight:800;color:#4caf50;font-family:'Courier New',monospace;margin:8px 0 20px">
          💰 ${state.money.toLocaleString()}<span style="font-size:0.6em;font-weight:400;color:#90caf9">đ</span>
        </div>
        <p style="color:rgba(255,255,255,0.4);font-size:0.85rem;margin-bottom:20px">Đạt tới câu ${Math.min(15,cur)}/15</p>
        <div class="btn-group">
          <button class="btn-play" onclick="startGame()">🔄 Chơi lại</button>
          <button class="btn-ss" onclick="takeSS()">📸 Chụp màn hình</button>
          <button class="btn-home" onclick="goHome()">🏠 Về trang chủ</button>
        </div>
      </div>
    </div>`;
  }
}

// Load question bank
fetch('questions.json')
  .then(r=>{
    if(!r.ok)throw new Error('HTTP '+r.status);
    return r.json();
  })
  .then(data=>{
    BANK=data;
    state.loading=false;
    render();
  })
  .catch(e=>{
    document.getElementById('app').innerHTML=`<div class="container" style="text-align:center;padding:40px">
      <div style="font-size:3rem;margin-bottom:16px">😵</div>
      <h2 style="color:#e53935;font-size:1.3rem;margin-bottom:8px">Không thể tải dữ liệu!</h2>
      <p style="color:#90caf9;margin-bottom:20px">${e.message}</p>
      <button class="start-btn" onclick="location.reload()">🔄 Thử lại</button>
    </div>`;
  });
</script>
</body>
</html>
