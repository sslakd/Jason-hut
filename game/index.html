<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ai Là Triệu Phú — Học Toán & Tiếng Anh</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#0a1628,#1a237e,#0d47a1);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.container{max-width:820px;width:100%;background:linear-gradient(180deg,#1a237e,#283593);border-radius:28px;padding:24px;box-shadow:0 8px 40px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.1);position:relative;overflow:hidden}
.container::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 40%,rgba(255,215,0,.06),transparent 50%);pointer-events:none}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;position:relative;z-index:1}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:42px;height:42px;background:linear-gradient(135deg,#ffd700,#ff8f00);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#1a237e;box-shadow:0 2px 8px rgba(255,215,0,.4)}
.logo-text{color:#ffd700;font-size:1.1rem;font-weight:700;letter-spacing:.5px;line-height:1.2}
.logo-text span{color:#82b1ff;font-size:.75rem;font-weight:400;display:block}
.money-display{background:linear-gradient(135deg,#2e7d32,#1b5e20);border-radius:12px;padding:8px 16px;display:flex;align-items:center;gap:8px;box-shadow:0 2px 12px rgba(46,125,50,.3)}
.money-icon{font-size:1.3rem}.money-amount{color:#fff;font-size:1.2rem;font-weight:800;font-family:'Courier New',monospace}
.money-amount span{color:#81c784;font-size:.8rem;font-weight:400}
.grade-btn,.subject-btn{padding:10px 24px;border-radius:12px;border:2px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:#bbb;font-size:1rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.grade-btn:hover,.subject-btn:hover{background:rgba(255,255,255,.1);color:#fff}
.grade-btn.selected,.subject-btn.selected{background:rgba(255,215,0,.15);color:#ffd700;border-color:rgba(255,215,0,.3)}
.grade-btn{padding:12px 28px;font-size:1.1rem;font-weight:700}
.grade-btn.selected{background:linear-gradient(135deg,#ffd700,#ff8f00);color:#1a237e;border-color:#ffd700;box-shadow:0 4px 16px rgba(255,215,0,.3)}
.start-btn{background:linear-gradient(135deg,#ffd700,#ff8f00);color:#1a237e;border:none;border-radius:14px;padding:14px 48px;font-size:1.15rem;font-weight:800;cursor:pointer;font-family:inherit;transition:all .2s;box-shadow:0 4px 20px rgba(255,215,0,.3)}
.start-btn:hover{transform:scale(1.03);box-shadow:0 6px 24px rgba(255,215,0,.4)}
.question-number{color:rgba(255,255,255,.5);font-size:.85rem;text-align:center;margin-bottom:4px}
.prize-ladder{display:flex;justify-content:center;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.ladder-step{padding:4px 10px;border-radius:8px;font-size:.72rem;font-weight:700;background:rgba(255,255,255,.06);color:rgba(255,255,255,.4);transition:all .3s;font-family:'Courier New',monospace}
.ladder-step.active{background:linear-gradient(135deg,#ffd700,#ff8f00);color:#1a237e;box-shadow:0 2px 10px rgba(255,215,0,.3)}
.ladder-step.passed{background:rgba(46,125,50,.3);color:#81c784}
.ladder-step.safe{border:1px solid rgba(255,215,0,.2)}
.question-box{background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:20px 24px;margin-bottom:16px;min-height:80px;display:flex;align-items:center;justify-content:center}
.question-text{color:#fff;font-size:1.15rem;font-weight:600;text-align:center;line-height:1.5}
.answers-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.answer-btn{padding:14px 16px;border:2px solid rgba(255,255,255,.12);border-radius:14px;background:rgba(255,255,255,.05);color:#fff;font-size:1rem;font-weight:600;cursor:pointer;transition:all .2s;text-align:left;display:flex;align-items:center;gap:10px;font-family:inherit}
.answer-btn .label{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;flex-shrink:0}
.answer-btn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2)}
.answer-btn.correct{background:rgba(46,125,50,.3);border-color:#4caf50;color:#a5d6a7}
.answer-btn.wrong{background:rgba(198,40,40,.3);border-color:#e53935;color:#ef9a9a}
.answer-btn.disabled{pointer-events:none;opacity:.5}
.play-again-btn,.screenshot-btn{border:none;border-radius:14px;padding:12px 28px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.play-again-btn{background:linear-gradient(135deg,#ffd700,#ff8f00);color:#1a237e;box-shadow:0 4px 16px rgba(255,215,0,.3)}
.play-again-btn:hover,.screenshot-btn:hover{transform:scale(1.02)}
.screenshot-btn{background:rgba(255,255,255,.1);color:#90caf9;border:1px solid rgba(255,255,255,.12)}
.home-btn{background:rgba(255,255,255,.08);color:#90caf9;border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:12px 28px;font-size:.95rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.home-btn:hover{background:rgba(255,255,255,.12)}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#2e7d32,#1b5e20);color:#fff;padding:12px 24px;border-radius:12px;font-size:.9rem;font-weight:600;display:none;z-index:1000;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@media(max-width:600px){.container{padding:16px;border-radius:20px}.logo-text{font-size:.95rem}.logo-text span{font-size:.7rem}.money-amount{font-size:1rem}.welcome-screen h1{font-size:1.4rem}.grade-btn{padding:10px 20px;font-size:.95rem}.subject-btn{padding:8px 16px;font-size:.85rem}.question-text{font-size:1rem}.answers-grid{grid-template-columns:1fr}.answer-btn{padding:12px 14px}.result-money{font-size:1.6rem}.result-actions{flex-direction:column;align-items:center}.play-again-btn,.screenshot-btn,.home-btn{width:100%;max-width:280px}}
</style>
</head>

let state = {grade:1, subject:'toan', questions:[], cur:-1, money:0, correct:0, answered:false, gameOver:false};
const PRIZES = [0,200,400,600,1000,2000,3000,4000,6000,8000,12000,16000,20000,30000,40000,50000];
const SAFE = new Set([5,10]);

function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function pickUnique(pool,n){
  let s=shuffle([...pool]),seen=new Set(),r=[];
  for(let q of s){
    let key=q.q.replace(/\d+/g,'#');
    if(!seen.has(key)){seen.add(key);r.push(q)}
    if(r.length>=n)break;
  }
  return r.length>=n?r:shuffle([...pool]).slice(0,n);
}

function setGrade(g){state.grade=g;render()}
function setSubject(s){state.subject=s;render()}

function startGame(){
  let pool=BANKS[state.subject][state.grade];
  if(!pool||pool.length<15){alert('Chưa đủ câu hỏi!');return}
  state.questions=pickUnique(pool,15);
  state.cur=0;state.money=0;state.correct=0;state.answered=false;state.gameOver=false;
  render();
}

function goHome(){state.cur=-1;render()}

function checkAnswer(idx){
  if(state.answered||state.gameOver)return;
  state.answered=true;
  let q=state.questions[state.cur];
  if(idx===q.c){
    state.correct++;state.cur++;
    state.money=PRIZES[state.cur];
    if(state.cur>=15){state.cur=15;render();return}
    setTimeout(()=>{state.answered=false;render()},1000);
  } else {
    state.gameOver=true;
    let guaranteed=0;
    SAFE.forEach(l=>{if(state.cur>=l)guaranteed=PRIZES[l]});
    state.money=guaranteed;
    setTimeout(()=>render(),1200);
  }
  render();
}

        <h1 style="color:#ffd700;font-size:1.8rem;font-weight:800;margin-bottom:4px">Ai Là Triệu Phú?</h1>
        <p style="color:#90caf9;margin-bottom:8px">Trả lời đúng 15 câu — rinh tiền thật! 🤑</p>
        <p style="color:rgba(255,255,255,0.3);font-size:0.8rem;margin-bottom:16px">📚 ${totalQ} câu hỏi trong ngân hàng</p>
        <div style="margin-bottom:12px">
          <p style="color:#90caf9;font-size:0.85rem;margin-bottom:8px">📚 Chọn lớp</p>
          <div style="display:flex;gap:12px;justify-content:center;margin-bottom:20px">
            <button class="grade-btn ${g===1?'selected':''}" onclick="setGrade(1)">Lớp 1</button>
            <button class="grade-btn ${g===2?'selected':''}" onclick="setGrade(2)">Lớp 2</button>
          </div>
        </div>
        <div style="margin-bottom:16px">
          <p style="color:#90caf9;font-size:0.85rem;margin-bottom:8px">🧮 Chọn môn</p>
          <div style="display:flex;gap:12px;justify-content:center;margin-bottom:24px">
            <button class="subject-btn ${s==='toan'?'selected':''}" onclick="setSubject('toan')">➕ Toán</button>
            <button class="subject-btn ${s==='tienganh'?'selected':''}" onclick="setSubject('tienganh')">🔤 Tiếng Anh</button>
          </div>
        </div>
        <button class="start-btn" onclick="startGame()">▶ BẮT ĐẦU</button>
      </div>
    </div>`;
  } else if(cur<15){
    // Game screen
    let q=state.questions[cur],labels=['A','B','C','D'];
    let ladder='';
    for(let i=1;i<=15;i++){
      let cls='ladder-step'+(i===cur+1?' active':(i<=cur?' passed':''))+(SAFE.has(i)?' safe':'');
      ladder+='<span class="'+cls+'">₫'+PRIZES[i].toLocaleString()+'</span>';
    }
    let answers='';
    for(let i=0;i<4;i++){
      let cls='answer-btn'+(state.answered?(i===q.c?' correct':' wrong'):'')+(state.answered?' disabled':'');
      let onclick=state.answered?'':'onclick="checkAnswer('+i+')"';
      answers+='<button class="'+cls+'" '+onclick+'><span class="label">'+labels[i]+'</span> '+q.a[i]+'</button>';
    }
    app.innerHTML=`<div class="container">
      <div class="header">
        <div class="logo"><div class="logo-icon">💰</div>
          <div class="logo-text">AI LÀ TRIỆU PHÚ<br><span>${subjLabel} Lớp ${g}</span></div></div>
        <div class="money-display"><span class="money-icon">🪙</span>
          <span class="money-amount">${state.money.toLocaleString()} <span>đ</span></span></div>
      </div>
      <div class="question-number">Câu ${cur+1} / 15</div>
      <div class="prize-ladder">${ladder}</div>
      <div class="question-box"><div class="question-text">${q.q}</div></div>
      <div class="answers-grid">${answers}</div>
    </div>`;
  } else {
    // Result screen
    let win=state.correct>=15;
    let icon=win?'🏆':(state.correct>=5?'😊':'😅');
    let title=win?'🎉 BẠN LÀ TRIỆU PHÚ! 🎉':(state.correct>=5?'Khá tốt!':'Cố gắng hơn nhé!');
    let sub=win?'Trả lời đúng cả 15 câu!':'Trả lời đúng '+state.correct+'/15 câu.';
    app.innerHTML=`<div class="container">
      <div class="header" style="margin-bottom:8px">
        <div class="logo"><div class="logo-icon">💰</div>
          <div class="logo-text">AI LÀ TRIỆU PHÚ<br><span>Kết quả</span></div></div>
      </div>
      <div style="text-align:center;padding:20px 16px">
        <div style="font-size:4rem;margin-bottom:8px">${icon}</div>
        <h2 style="color:#ffd700;font-size:1.6rem;font-weight:800;margin-bottom:4px">${title}</h2>
        <p style="color:#90caf9;margin-bottom:6px">${sub}</p>
        <div style="font-size:2.2rem;font-weight:800;color:#4caf50;font-family:'Courier New',monospace;margin:8px 0 20px">
          💰 ${state.money.toLocaleString()}<span style="font-size:0.6em;font-weight:400;color:#90caf9">đ</span>
        </div>
        <p style="color:rgba(255,255,255,0.4);font-size:0.85rem;margin-bottom:20px">Đạt tới câu ${Math.min(15,cur)}/15</p>
        <div style="display:flex;justify-content:center;gap:10px;flex-wrap:wrap">
          <button class="play-again-btn" onclick="startGame()">🔄 Chơi lại</button>
          <button class="screenshot-btn" onclick="takeSS()">📸 Chụp màn hình</button>
          <button class="home-btn" onclick="goHome()">🏠 Về trang chủ</button>
        </div>
      </div>
    </div>`;
  }
}

// Initial render
render();
</script>
</body>
</html>
