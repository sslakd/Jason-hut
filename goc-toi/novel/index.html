<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vụ Án AI Cuối Cùng — Góc Tối</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#f1f5f9;min-height:100vh;display:flex}
  .sidebar{width:280px;background:#1e293b;padding:20px;overflow-y:auto;border-right:1px solid #334155;position:fixed;top:0;left:0;height:100vh}
  .sidebar h2{font-size:14px;color:#94a3b8;margin-bottom:16px;letter-spacing:1px;text-transform:uppercase}
  .sidebar a{display:block;padding:8px 12px;color:#cbd5e1;text-decoration:none;border-radius:6px;font-size:13px;margin-bottom:2px;transition:all .1s}
  .sidebar a:hover{background:#334155;color:#38bdf8}
  .sidebar a.active{background:#1e3a5f;color:#38bdf8;font-weight:600}
  .sidebar .home{color:#38bdf8;font-weight:600;padding:10px 12px;margin-bottom:12px;border-bottom:1px solid #334155}
  .sidebar .home:hover{background:transparent}
  .content{flex:1;margin-left:280px;padding:40px;max-width:800px;line-height:1.8;font-size:16px}
  .content h1{font-size:28px;margin:32px 0 16px;color:#f8fafc}
  .content h2{font-size:22px;margin:28px 0 12px;color:#e2e8f0}
  .content h3{font-size:18px;margin:22px 0 10px;color:#cbd5e1}
  .content p{margin-bottom:16px}
  .content strong{color:#facc15}
  .content em{color:#38bdf8}
  .content code{background:#1e293b;padding:2px 6px;border-radius:4px;font-size:14px;color:#a5b4fc}
  .content pre{background:#1e293b;padding:16px;border-radius:8px;overflow-x:auto;margin:16px 0;border:1px solid #334155}
  .content pre code{background:transparent;padding:0}
  .content blockquote{border-left:3px solid #38bdf8;padding:12px 16px;margin:16px 0;background:#1e293b;border-radius:0 8px 8px 0;color:#94a3b8}
  .content table{width:100%;border-collapse:collapse;margin:16px 0}
  .content th,.content td{padding:10px 12px;border:1px solid #334155;text-align:left}
  .content th{background:#1e3a5f;color:#38bdf8;font-weight:600}
  .content td{color:#cbd5e1}
  .content img{max-width:100%;border-radius:8px;margin:16px 0}
  .content ul,.content ol{padding-left:24px;margin-bottom:16px}
  .content li{margin-bottom:6px}
  .loading{display:flex;align-items:center;justify-content:center;height:80vh;color:#475569;font-size:18px}
  .chapter-title{font-size:24px;font-weight:700;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #334155;color:#facc15}
  .footer{margin-top:48px;padding-top:16px;border-top:1px solid #334155;color:#475569;font-size:12px}
  .emoji-big{font-size:48px;margin-bottom:16px}
  @media(max-width:768px){
    .sidebar{width:100%;position:relative;height:auto;border-right:none;border-bottom:1px solid #334155;padding:12px}
    .content{margin-left:0;padding:20px}
    .sidebar h2{display:none}
    .sidebar a{display:inline-block;padding:4px 8px;font-size:12px;margin:2px}
  }
</style>
</head>
<body>
<div class="sidebar" id="sidebar">
  <a href="/goc-toi/" class="home">← Góc Tối</a>
  <h2>Mục lục</h2>
  <a href="?ch=0" id="ch0" class="active">📖 Giới thiệu</a>
</div>
<div class="content" id="content">
  <div class="loading">Đang tải...</div>
</div>
<script>
const CHAPTERS = [
  { file: 'README.md', title: 'Giới thiệu' },
  { file: '01-dit-me-con-ai-do-hon.md', title: 'Chương 1: "Địt Mẹ, Con AI Nó Dở Hơi Rồi!"' },
  { file: '02-6-loai-agent.md', title: 'Chương 2: 6 Loại AI Agent' },
  { file: '03-nao-cua-thang-dien.md', title: 'Chương 3: Não Của Thằng Điên' },
  { file: '04-tho-can-do-nghe.md', title: 'Chương 4: Thợ Cần Đồ Nghề' },
  { file: '05-ca-vang-ai.md', title: 'Chương 5: Cá Vàng AI' },
  { file: '06-context-engineering.md', title: 'Chương 6: Context Engineering' },
  { file: '07-rag.md', title: 'Chương 7: RAG — Đọc Sách Trước Khi Nói' },
  { file: '08-planning.md', title: 'Chương 8: Planning' },
  { file: '09-multi-agent.md', title: 'Chương 9: Multi-Agent' },
  { file: '10-metacognition.md', title: 'Chương 10: Metacognition' },
  { file: '11-code-interpreter.md', title: 'Chương 11: Code Interpreter' },
  { file: '12-bao-mat.md', title: 'Chương 12: Bảo Mật' },
  { file: '13-production.md', title: 'Chương 13: Production' },
  { file: '14-ngoai-giao.md', title: 'Chương 14: Ngoại Giao' },
  { file: '15-framework.md', title: 'Chương 15: Framework' },
  { file: '16-cua.md', title: 'Chương 16: CUA (Computer Use Agent)' },
  { file: '17-chung-cu.md', title: 'Chương 17: Chung Cư' },
  { file: '18-ket-thuc.md', title: 'Chương 18: Kết Thúc' },
];

const sidebar = document.getElementById('sidebar');
const content = document.getElementById('content');

// Build sidebar
CHAPTERS.forEach((ch, i) => {
  const a = document.createElement('a');
  a.href = `?ch=${i}`;
  a.id = `ch${i}`;
  a.textContent = ch.title;
  sidebar.appendChild(a);
});

// Detect chapter from URL
const params = new URLSearchParams(window.location.search);
const chIndex = parseInt(params.get('ch')) || 0;

function setActive(index) {
  document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
  const el = document.getElementById(`ch${index}`);
  if (el) el.classList.add('active');
}

async function loadChapter(index) {
  setActive(index);
  content.innerHTML = '<div class="loading">📖 Đang tải...</div>';
  try {
    const res = await fetch(CHAPTERS[index].file);
    const md = await res.text();
    const html = marked.parse(md);
    const title = index === 0 ? '📖 VỤ ÁN AI CUỐI CÙNG' : CHAPTERS[index].title;
    content.innerHTML = `
      <div class="chapter-title">${title}</div>
      ${html}
      <div class="footer">Vụ Án AI Cuối Cùng — sslakd.com/goc-toi/novel/</div>
    `;
    document.title = `${CHAPTERS[index].title} — Vụ Án AI Cuối Cùng`;
  } catch (e) {
    content.innerHTML = `<p style="color:#ef4444">❌ Lỗi tải chương: ${e.message}</p>`;
  }
}

loadChapter(chIndex);

// Handle back/forward
window.addEventListener('popstate', () => {
  const p = new URLSearchParams(window.location.search);
  loadChapter(parseInt(p.get('ch')) || 0);
});
</script>
</body>
</html>
